<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Enrollment Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card p-4 shadow">
    <h3 class="text-center mb-4">Student Enrollment Form</h3>

    <form id="studentForm" method="post">
      
      <div class="mb-3">
        <label>Roll No (Primary Key)</label>
        <input type="text" id="rollNo" class="form-control" required autofocus>
      </div>

      <div class="mb-3">
        <label>Full Name</label>
        <input type="text" id="fullName" class="form-control" required>
      </div>

      <div class="mb-3">
        <label>Class</label>
        <input type="text" id="class" class="form-control" required>
      </div>

      <div class="mb-3">
        <label>Birth Date</label>
        <input type="date" id="birthDate" class="form-control" required>
      </div>

      <div class="mb-3">
        <label>Address</label>
        <input type="text" id="address" class="form-control" required>
      </div>

      <div class="mb-3">
        <label>Enrollment Date</label>
        <input type="date" id="enrollDate" class="form-control" required>
      </div>

      <div class="text-center">
        <button type="button" id="saveBtn" class="btn btn-success" disabled>Save</button>
        <button type="button" id="updateBtn" class="btn btn-warning" disabled>Update</button>
        <button type="button" id="resetBtn" class="btn btn-secondary" disabled>Reset</button>
      </div>

    </form>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
